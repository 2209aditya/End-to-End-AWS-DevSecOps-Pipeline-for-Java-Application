apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: java-app-green
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/your-org/aws-devsecops-java-app
    targetRevision: HEAD
    path: helm/java-app
    helm:
      valueFiles:
        - values-green.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: prod

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
