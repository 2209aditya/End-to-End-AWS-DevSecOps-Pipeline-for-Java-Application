apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: java-app-blue
spec:
  source:
    repoURL: https://github.com/your-org/aws-devsecops-java-app
    path: helm/java-app
    targetRevision: HEAD
    helm:
      valueFiles:
        - values-blue.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
