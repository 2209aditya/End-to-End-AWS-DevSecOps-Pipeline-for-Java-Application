version: "3.9"

services:

  app:
    container_name: my-app
    image: myrepo/my-app:v1
    restart: always
    depends_on:
      - db
      - redis
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - REDIS_HOST=redis
    ports:
      - "8080:8080"
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M

  db:
    container_name: postgres-db
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mydb
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - app-network

  redis:
    container_name: redis-cache
    image: redis:7
    restart: always
    networks:
      - app-network

  nginx:
    container_name: nginx-proxy
    image: nginx:latest
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app
    networks:
      - app-network

# -----------------------------
# Networks
# -----------------------------
networks:
  app-network:
    driver: bridge

# -----------------------------
# Volumes
# -----------------------------
volumes:
  db-data:
